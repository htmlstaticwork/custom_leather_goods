<!DOCTYPE html>
<html lang="en" dir="ltr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description"
        content="Create a Heritage & Hide account to track your orders and manage your bespoke leather collection.">
    <link rel="icon" type="image/svg+xml" href="assets/images/favicon.svg">
    <title>Register | Heritage & Hide</title>
    <!-- Fonts -->
    <link rel="stylesheet" href="assets/css/style.css">
    <link rel="stylesheet" href="assets/css/rtl.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        body {
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background-color: var(--bg-secondary);
            padding: var(--space-4);
        }

        .auth-card {
            background: var(--bg-card);
            width: 100%;
            max-width: 480px;
            padding: var(--space-12);
            border-radius: var(--radius-xl);
            box-shadow: var(--shadow-xl);
            position: relative;
            text-align: center;
        }

        .auth-toggles {
            position: fixed;
            top: var(--space-4);
            right: var(--space-4);
            display: flex;
            gap: var(--space-2);
            z-index: 1000;
        }

        [dir="rtl"] .auth-toggles {
            right: auto;
            left: var(--space-6);
        }

        .auth-logo {
            margin-bottom: var(--space-8);
            display: inline-flex;
            flex-direction: row;
            /* changed from column */
            align-items: center;
            gap: var(--space-2);
            transition: transform var(--transition-fast);
        }

        .auth-logo:hover {
            transform: scale(1.05);
        }


        .input-icon-wrapper {
            position: relative;
            display: block;
        }

        .input-icon-wrapper .form-control {
            padding-left: 2.75rem;
            width: 100%;
        }

        .field-icon {
            position: absolute;
            left: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }

        .field-icon i {
            width: 18px;
            height: 18px;
        }

        .password-toggle {
            position: absolute;
            right: var(--space-4);
            top: 50%;
            transform: translateY(-50%);
            background: none;
            border: none;
            cursor: pointer;
            color: var(--text-muted);
            padding: 0;
            width: 18px;
            height: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        [dir="rtl"] .password-toggle {
            right: auto;
            left: var(--space-4);
        }

        .divider {
            margin: var(--space-8) 0;
            position: relative;
            text-align: center;
            color: var(--text-muted);
            font-size: var(--text-xs);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .divider::before,
        .divider::after {
            content: '';
            position: absolute;
            top: 50%;
            width: calc(45% - 1.5rem);
            height: 1px;
            background-color: var(--border-color);
        }

        .divider::before {
            left: 0;
        }

        .divider::after {
            right: 0;
        }

        .social-btn {
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: var(--space-3);
            padding: var(--space-4);
            border-radius: var(--radius-md);
            font-weight: 600;
            margin-bottom: var(--space-4);
            border: 2px solid transparent;
            cursor: pointer;
            transition: var(--transition-base);
            font-size: var(--text-sm);
        }

        .social-google {
            background-color: white;
            color: #444;
            border-color: #ddd;
        }

        .social-google:hover {
            background-color: #f5f5f5;
        }

        .social-google i {
            color: #EA4335;
        }

        .social-apple {
            background-color: white;
            color: #444;
            border-color: #ddd;
        }

        .social-apple:hover {
            background-color: #f5f5f5;
        }

        .social-apple i {
            color: #000;
        }

        .social-email {
            background-color: var(--bg-secondary);
            color: var(--text-primary);
        }

        .social-email:hover {
            background-color: var(--border-color);
        }
    </style>
</head>

<body>
    <div class="auth-toggles">
        <button class="icon-btn rtl-toggle" title="Toggle RTL"><i data-lucide="arrow-left-right"></i></button>
        <button class="icon-btn theme-toggle" title="Toggle Theme">
            <i data-lucide="sun"></i>
            <i data-lucide="moon"></i>
        </button>
    </div>

    <div class="auth-card">

        <a href="index.html" class="auth-logo">
            <svg width="30" height="34" viewBox="0 0 30 34" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M15 1L2 6.5v10C2 24.15 7.8 29.8 15 32c7.2-2.2 13-7.85 13-15.5V6.5L15 1Z"
                    fill="var(--color-primary)" fill-opacity="0.12" stroke="var(--color-primary)" stroke-width="1.6"
                    stroke-linejoin="round" />
                <text x="15" y="21" text-anchor="middle" font-family="Cormorant Garamond, Georgia, serif" font-size="11"
                    font-weight="600" fill="var(--color-primary)" letter-spacing="0.5">HH</text>
            </svg>
            <span class="logo-wordmark">H&amp;H</span>
        </a>


        <form>

            <div class="form-group">
                <div class="input-icon-wrapper">
                    <input type="text" class="form-control" placeholder="First Name" required>
                    <span class="field-icon"><i data-lucide="user"></i></span>
                </div>
            </div>


            <div class="form-group">
                <div class="input-icon-wrapper">
                    <input type="email" class="form-control" placeholder="Email Address" required>
                    <span class="field-icon"><i data-lucide="mail"></i></span>
                </div>
            </div>
            <div class="form-group">
                <div class="input-icon-wrapper">
                    <input type="password" class="form-control" placeholder="Password" required>
                    <span class="field-icon"><i data-lucide="lock"></i></span>
                    <button type="button" class="password-toggle">
                        <i data-lucide="eye" style="width:18px;"></i>
                        <i data-lucide="eye-off" style="width:18px; display:none;"></i>
                    </button>
                </div>
            </div>


            <div style="margin-bottom: var(--space-6); font-size: var(--text-sm); text-align: left;">
                <label
                    style="display: flex; align-items: center; gap: var(--space-3); cursor: pointer; color: var(--text-secondary);">
                    <input type="checkbox"
                        style="width: 18px; height: 18px; min-width: 18px; accent-color: var(--color-primary);"
                        required>
                    <span>I accept the <a href="#" style="color: var(--color-primary); font-weight: 600;">Terms &
                            Conditions</a></span>
                </label>
            </div>

            <button type="submit" class="btn btn-primary" style="width: 100%; padding: var(--space-4);">Create
                Account</button>
        </form>

        <div class="divider">or continue with</div>

        <button class="social-btn social-google">
            <svg width="18" height="18" viewBox="0 0 48 48">
                <path fill="#EA4335"
                    d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z" />
                <path fill="#4285F4"
                    d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z" />
                <path fill="#FBBC05"
                    d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z" />
                <path fill="#34A853"
                    d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.18 1.48-4.97 2.31-8.16 2.31-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z" />
            </svg>
            Continue with Google
        </button>

        <button class="social-btn social-apple">
            <i class="fa-brands fa-apple" style="font-size: 1.25rem;"></i>
            Continue with Apple
        </button>


        <p style="margin-top: var(--space-8); font-size: var(--text-sm); color: var(--text-secondary);">
            Already have an account? <a href="login.html"
                style="color: var(--color-primary); font-weight: 700;">Login</a>
        </p>
    </div>

    <script src="assets/js/main.js"></script>
</body>

</html>
